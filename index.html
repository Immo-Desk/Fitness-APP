<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Trainingsplan">
<title>Trainingsplan</title>
<style>
@media (orientation:landscape) and (max-height:500px){
  #rotate-ov{display:flex!important}
}
/* ═══ DARK (default) ═══ */
:root {
  --bg:#0d0d0d; --bg2:#1a1a1a; --bg3:#242424; --bg4:#2e2e2e;
  --b0:rgba(255,255,255,0.07); --b1:rgba(255,255,255,0.13);
  --t0:#ffffff; --t1:#9a9a9a; --t2:#555555;
  --shadow:rgba(0,0,0,0.7);
  --blue:#a3e635;  --blue-bg:rgba(163,230,53,0.12);  --blue-b:rgba(163,230,53,0.35);  --blue-hdr:rgba(163,230,53,0.14);
  --teal:#34d399;  --teal-bg:rgba(52,211,153,0.12);  --teal-b:rgba(52,211,153,0.35);  --teal-hdr:rgba(52,211,153,0.14);
  --green:#a3e635; --green-bg:rgba(163,230,53,0.12); --green-b:rgba(163,230,53,0.35); --green-hdr:rgba(163,230,53,0.14);
  --amber:#f59e0b; --amber-bg:rgba(245,158,11,0.12); --amber-b:rgba(245,158,11,0.35); --amber-hdr:rgba(245,158,11,0.14);
  --coral:#f43f5e; --coral-bg:rgba(244,63,94,0.12);  --coral-b:rgba(244,63,94,0.35);  --coral-hdr:rgba(244,63,94,0.14);
  --purple:#a78bfa;--purple-bg:rgba(167,139,250,0.12);--purple-b:rgba(167,139,250,0.35);--purple-hdr:rgba(167,139,250,0.14);
  --gold:#f59e0b; --r:14px; --rs:10px;
}
/* ═══ LIGHT ═══ */
body.light {
  --bg:#f2f2f7; --bg2:#ffffff; --bg3:#ebebf0; --bg4:#dcdce0;
  --b0:rgba(0,0,0,0.07); --b1:rgba(0,0,0,0.13);
  --t0:#1c1c1e; --t1:#636374; --t2:#aeaeb8;
  --shadow:rgba(0,0,0,0.12);
}
*,*::before,*::after { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; touch-action:manipulation; -webkit-text-size-adjust:none; }
html,body { overscroll-behavior:none; -webkit-user-select:none; user-select:none; }
input,select,textarea { -webkit-user-select:text; user-select:text; touch-action:auto; }
body { font-family:-apple-system,system-ui,sans-serif; background:var(--bg); color:var(--t0); min-height:100vh; padding-bottom:calc(82px + env(safe-area-inset-bottom)); transition:background .25s,color .25s; -webkit-font-smoothing:antialiased; letter-spacing:-.01em; }

/* ── Set detail ── */
.set-detail { margin-top:11px; padding-top:11px; border-top:1px solid var(--b0); }
.set-detail-hdr { display:flex; align-items:center; justify-content:space-between; margin-bottom:8px; }
.set-detail-title { font-size:11px; font-weight:600; color:var(--t2); text-transform:uppercase; letter-spacing:.05em; }
.set-row { display:flex; align-items:center; gap:5px; padding:6px 0; border-bottom:1px solid var(--b0); }
.set-row:last-child { border-bottom:none; }
.set-row.done { opacity:.45; }
.set-num { font-size:12px; color:var(--t2); width:18px; text-align:center; flex-shrink:0; }
.set-inp { background:var(--bg3); border:1px solid var(--b1); border-radius:8px; color:var(--t0); font-size:13px; font-weight:600; text-align:center; padding:5px 3px; font-family:inherit; outline:none; -webkit-appearance:none; appearance:none; }
.set-unit { font-size:11px; color:var(--t2); flex-shrink:0; }
.set-done-btn { width:30px; height:30px; border-radius:50%; border:2px solid var(--b1); background:transparent; color:transparent; font-size:13px; cursor:pointer; flex-shrink:0; display:flex; align-items:center; justify-content:center; transition:all .15s; margin-left:auto; }
.set-done-btn.done { background:var(--green); border-color:var(--green); color:#000; }
.set-timer-btn { width:30px; height:30px; border-radius:50%; border:1px solid var(--b1); background:var(--bg3); color:var(--t1); font-size:14px; cursor:pointer; flex-shrink:0; display:flex; align-items:center; justify-content:center; }
.set-add-btn { width:100%; padding:9px; margin-top:8px; background:transparent; border:1px dashed var(--b1); border-radius:var(--rs); color:var(--t2); font-size:12px; font-family:inherit; cursor:pointer; }
.ex-expand-toggle { font-size:10px; color:var(--t2); margin-left:6px; vertical-align:middle; }

/* ── Card elevation ── */
.stat-card, .ex-card, .week-strip, .cs, .info-card,
.manage-day-row, .manage-edit-form, .home-sm, .coach,
.day-hdr, .add-day-card {
  box-shadow: 0 4px 20px rgba(0,0,0,0.5);
}
.bottom-nav {
  position:fixed; bottom:0; left:0; right:0; z-index:200;
  height:calc(62px + env(safe-area-inset-bottom));
  padding-bottom:env(safe-area-inset-bottom);
  background:var(--bg2); border-top:1px solid var(--b0);
  display:flex; align-items:stretch;
}
.nav-tab {
  flex:1; display:flex; flex-direction:column; align-items:center;
  justify-content:center; gap:3px; cursor:pointer; padding-top:6px;
  transition:opacity .15s;
}
.nav-tab:active { opacity:.6; }
.nav-tab-icon  { font-size:22px; line-height:1; filter:grayscale(1) brightness(.5); transition:filter .2s; }
.nav-tab.on .nav-tab-icon { filter:none; }
.nav-tab-label { font-size:10px; font-weight:500; color:var(--t2); transition:color .2s; }
.nav-tab.on .nav-tab-label { font-weight:700; color:var(--green); }

/* ── Header ── */
.hdr { padding:calc(48px + env(safe-area-inset-top)) 18px 14px; background:var(--bg); position:sticky; top:0; z-index:100; border-bottom:1px solid var(--b0); }
.hdr-row { display:flex; align-items:center; justify-content:space-between; gap:10px; }
.hdr-left { flex:1; min-width:0; }
.hdr-h1   { font-size:28px; font-weight:800; letter-spacing:-.6px; color:var(--t0); }
.hdr-sub  { font-size:12px; color:var(--t2); margin-top:3px; }
.hdr-actions { display:flex; align-items:center; gap:8px; flex-shrink:0; }
.back-btn { display:flex; align-items:center; gap:5px; font-size:14px; font-weight:600; color:var(--t1); background:none; border:none; cursor:pointer; padding:0; white-space:nowrap; }
.theme-btn { width:36px; height:36px; border-radius:50%; border:1px solid var(--b1); background:var(--bg2); font-size:16px; cursor:pointer; display:flex; align-items:center; justify-content:center; }
.toast { font-size:12px; font-weight:600; color:var(--green); opacity:0; transition:opacity .25s; white-space:nowrap; }
.toast.on { opacity:1; }

/* ── Tabs bar ── */
.tabs { display:flex; gap:7px; overflow-x:auto; padding:11px 18px; background:var(--bg); position:sticky; top:97px; z-index:99; border-bottom:1px solid var(--b0); scrollbar-width:none; }
.tabs::-webkit-scrollbar { display:none; }
.tab { display:flex; align-items:center; justify-content:center; padding:9px 16px; border-radius:99px; border:1.5px solid var(--b0); background:var(--bg2); cursor:pointer; min-width:70px; flex-shrink:0; font-size:12px; font-weight:600; color:var(--t1); white-space:nowrap; }

/* ── Page ── */
.page { padding:16px 15px 10px; }

/* ══════════════ HOME ══════════════ */
.home-greeting { margin-bottom:20px; }
.home-date { font-size:13px; color:var(--t2); margin-bottom:3px; }
.home-h    { font-size:30px; font-weight:800; letter-spacing:-.6px; }
.home-sub  { font-size:14px; color:var(--t1); margin-top:3px; }

/* Week strip */
.week-strip { background:var(--bg2); border:1px solid var(--b0); border-radius:var(--r); padding:14px 15px; margin-bottom:14px; }
.week-title { font-size:11px; font-weight:700; color:var(--t2); text-transform:uppercase; letter-spacing:.06em; margin-bottom:11px; }
.week-days  { display:grid; grid-template-columns:repeat(7,1fr); gap:4px; }
.week-day   { display:flex; flex-direction:column; align-items:center; gap:5px; }
.week-day-lbl { font-size:10px; color:var(--t2); font-weight:500; }
.week-dot   { width:30px; height:30px; border-radius:50%; border:1.5px solid var(--b1); display:flex; align-items:center; justify-content:center; font-size:12px; }
.week-dot.trained { border-color:transparent; }

/* Home nav cards */
.home-nav  { display:grid; grid-template-columns:1fr 1fr; gap:11px; margin-bottom:11px; }
.home-card { border-radius:var(--r); border:1.5px solid; padding:16px 14px; cursor:pointer; transition:transform .12s, opacity .12s; min-height:120px; display:flex; flex-direction:column; justify-content:space-between; }
.home-card:active { transform:scale(.97); opacity:.85; }
.home-card-icon  { font-size:26px; margin-bottom:8px; }
.home-card-title { font-size:15px; font-weight:700; }
.home-card-sub   { font-size:12px; margin-top:2px; opacity:.75; }
.home-card-arr   { font-size:18px; opacity:.5; align-self:flex-end; }

/* Home secondary cards */
.home-sm-row { display:grid; grid-template-columns:1fr 1fr; gap:11px; margin-bottom:14px; }
.home-sm { background:var(--bg2); border:1px solid var(--b0); border-radius:var(--r); padding:14px 15px; cursor:pointer; transition:transform .12s; }
.home-sm:active { transform:scale(.98); }
.home-sm-icon  { font-size:20px; margin-bottom:6px; }
.home-sm-title { font-size:14px; font-weight:700; }
.home-sm-sub   { font-size:12px; color:var(--t1); margin-top:2px; }

/* Last session card */
.last-sess { background:var(--bg2); border:1px solid var(--b0); border-radius:var(--r); padding:13px 14px; margin-bottom:14px; }
.last-sess-title { font-size:11px; font-weight:600; color:var(--t2); text-transform:uppercase; letter-spacing:.05em; margin-bottom:8px; }
.last-sess-row { display:flex; justify-content:space-between; align-items:center; padding:6px 0; border-bottom:1px solid var(--b0); }
.last-sess-row:last-child { border-bottom:none; }
.last-sess-label { font-size:13px; color:var(--t1); }
.last-sess-val   { font-size:13px; font-weight:600; }

/* ══════════════ MANAGE DAYS ══════════════ */
.manage-day-row { display:flex; align-items:center; gap:10px; padding:12px 14px; background:var(--bg2); border:1px solid var(--b0); border-radius:var(--r); margin-bottom:9px; }
.manage-icon-btn { width:40px; height:40px; border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:20px; flex-shrink:0; border:none; background:var(--bg3); cursor:pointer; }
.manage-day-info { flex:1; min-width:0; }
.manage-day-title { font-size:14px; font-weight:600; }
.manage-day-sub   { font-size:12px; color:var(--t1); margin-top:2px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.manage-controls  { display:flex; gap:5px; flex-shrink:0; }
.mc-btn { width:32px; height:32px; border-radius:7px; border:1px solid var(--b1); background:var(--bg3); color:var(--t1); font-size:14px; cursor:pointer; display:flex; align-items:center; justify-content:center; }
.mc-btn.del { border-color:rgba(255,110,92,0.35); color:var(--coral); }
.mc-btn.hide-on { background:var(--amber-bg); border-color:var(--amber-b); color:var(--amber); }

.manage-edit-form { background:var(--bg3); border:1px solid var(--b1); border-radius:var(--rs); padding:12px 14px; margin-bottom:9px; }
.field { margin-bottom:8px; }
.field label { font-size:11px; color:var(--t2); display:block; margin-bottom:4px; font-weight:500; }
.field input, .field select { width:100%; padding:9px 11px; background:var(--bg2); border:1px solid var(--b1); border-radius:var(--rs); color:var(--t0); font-size:14px; font-family:inherit; outline:none; -webkit-appearance:none; }
.field-row2 { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
.save-day-btn { width:100%; padding:11px; background:var(--green); border:none; border-radius:var(--rs); color:#000; font-size:13px; font-weight:700; font-family:inherit; cursor:pointer; margin-top:4px; }
.add-day-card { border-radius:var(--r); border:1.5px dashed var(--b1); padding:16px; text-align:center; cursor:pointer; color:var(--t2); font-size:14px; margin-bottom:9px; }
.add-day-card:active { background:var(--bg3); }

/* ══════════════ STATS ══════════════ */
.stat-tabs { display:flex; gap:7px; margin-bottom:14px; flex-wrap:wrap; }
.stat-tab { padding:8px 14px; border-radius:99px; border:1.5px solid var(--b0); background:var(--bg2); font-size:12px; font-weight:600; color:var(--t1); cursor:pointer; white-space:nowrap; }
.stat-tab.on { border-color:var(--blue); background:var(--blue-bg); color:var(--blue); }

.stat-card { background:var(--bg2); border:1px solid var(--b0); border-radius:var(--r); padding:14px; margin-bottom:13px; }
.stat-card-title { font-size:12px; font-weight:600; color:var(--t2); text-transform:uppercase; letter-spacing:.05em; margin-bottom:12px; }
.chart-wrap { width:100%; overflow:hidden; border-radius:var(--rs); }
.no-data { text-align:center; padding:30px; font-size:13px; color:var(--t2); }

/* BW */
.bw-input-row { display:flex; gap:8px; margin-bottom:14px; }
.bw-input { flex:1; padding:11px 13px; background:var(--bg3); border:1px solid var(--b1); border-radius:var(--rs); color:var(--t0); font-size:16px; font-family:inherit; -webkit-appearance:none; outline:none; }
.bw-btn   { padding:11px 16px; background:var(--green); border:none; border-radius:var(--rs); color:#000; font-size:14px; font-weight:700; font-family:inherit; cursor:pointer; flex-shrink:0; }
.info-row { display:flex; justify-content:space-between; align-items:center; padding:7px 0; border-bottom:1px solid var(--b0); }
.info-row:last-child { border-bottom:none; }
.info-row-label { font-size:13px; color:var(--t1); }
.info-row-val   { font-size:13px; font-weight:600; }
.bw-list-row { display:flex; justify-content:space-between; align-items:center; padding:8px 0; border-bottom:1px solid var(--b0); }
.bw-list-row:last-child { border-bottom:none; }
.bw-list-date { font-size:12px; color:var(--t2); }
.bw-list-val  { font-size:14px; font-weight:600; }
.bw-del { font-size:15px; color:var(--coral); background:none; border:none; cursor:pointer; padding:2px 6px; }

/* Prog */
.ex-select { width:100%; padding:11px 13px; background:var(--bg3); border:1px solid var(--b1); border-radius:var(--rs); color:var(--t0); font-size:14px; font-family:inherit; -webkit-appearance:none; outline:none; }

/* PR Board */
.pr-group { font-size:11px; font-weight:600; text-transform:uppercase; letter-spacing:.05em; margin:12px 0 7px; }
.pr-row { display:flex; align-items:center; gap:10px; padding:9px 0; border-bottom:1px solid var(--b0); }
.pr-row:last-child { border-bottom:none; }
.pr-name { flex:1; font-size:13px; color:var(--t1); }
.pr-val  { font-size:15px; font-weight:700; color:var(--gold); }

/* 1RM */
.orm-row { display:flex; justify-content:space-between; align-items:center; padding:8px 0; border-bottom:1px solid var(--b0); }
.orm-row:last-child { border-bottom:none; }
.orm-name { font-size:13px; color:var(--t1); flex:1; }
.orm-val  { font-size:14px; font-weight:700; color:var(--blue); }

/* Calendar */
.cal-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:12px; }
.cal-month  { font-size:15px; font-weight:700; }
.cal-nav    { width:32px; height:32px; border-radius:50%; border:1px solid var(--b1); background:var(--bg3); color:var(--t0); font-size:16px; cursor:pointer; display:flex; align-items:center; justify-content:center; }
.cal-grid   { display:grid; grid-template-columns:repeat(7,1fr); gap:3px; }
.cal-dow    { font-size:10px; font-weight:600; color:var(--t2); text-align:center; padding:4px 0; }
.cal-cell   { min-height:38px; border-radius:7px; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:3px; background:transparent; padding:4px 2px; }
.cal-cell.today { background:var(--bg3); }
.cal-num   { font-size:12px; color:var(--t1); line-height:1; }
.cal-num.today-num { color:var(--blue); font-weight:700; }
.cal-dot   { width:7px; height:7px; border-radius:50%; flex-shrink:0; }

/* ══════════════ PLAN SCREEN ══════════════ */
.day-hdr { display:flex; align-items:center; gap:12px; padding:14px 15px; border-radius:var(--r); border:1.5px solid; margin-bottom:13px; }
.day-icon { width:44px; height:44px; border-radius:11px; display:flex; align-items:center; justify-content:center; font-size:21px; flex-shrink:0; }
.day-title { font-size:20px; font-weight:700; letter-spacing:-.4px; }
.day-sub   { font-size:12px; margin-top:2px; opacity:.75; }
.day-badge { text-align:right; margin-left:auto; flex-shrink:0; }
.day-badge-val { font-size:16px; font-weight:700; }
.day-badge-lbl { font-size:11px; opacity:.7; margin-top:1px; }

.edit-row { display:flex; justify-content:flex-end; margin-bottom:10px; }
.edit-btn { font-size:12px; font-weight:600; padding:6px 14px; border-radius:99px; border:1.5px solid var(--b1); background:transparent; color:var(--t1); cursor:pointer; }
.edit-btn.active { background:var(--bg3); color:var(--t0); }

.prog-wrap { margin-bottom:13px; }
.prog-row  { display:flex; justify-content:space-between; align-items:center; margin-bottom:6px; }
.prog-lbl  { font-size:12px; font-weight:600; color:var(--t1); }
.prog-cnt  { font-size:12px; font-weight:700; }
.prog-bar  { height:5px; border-radius:99px; background:var(--b0); overflow:hidden; }
.prog-fill { height:100%; border-radius:99px; transition:width .3s; }

.cg { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:13px; }
.cs { background:var(--bg2); border:1px solid var(--b0); border-radius:var(--rs); padding:11px 13px; }
.cs-l { font-size:11px; color:var(--t2); margin-bottom:3px; }
.cs-v { font-size:15px; font-weight:600; }

.ex-card { background:var(--bg2); border-radius:var(--r); overflow:hidden; margin-bottom:13px; border:1px solid var(--b0); border-left-width:3px; }
.ex-row  { padding:12px 12px 12px 13px; border-bottom:1px solid var(--b0); transition:background .2s, opacity .2s; }
.ex-row:last-child { border-bottom:none; }
.ex-row.done { background:rgba(128,128,128,0.08); opacity:.5; }

.ex-row-head { display:flex; align-items:flex-start; gap:9px; }
.ex-controls { display:none; flex-direction:column; gap:3px; flex-shrink:0; }
.ex-controls.show { display:flex; }
.ctrl-btn { width:30px; height:28px; border-radius:6px; border:1px solid var(--b1); background:var(--bg3); color:var(--t1); font-size:14px; cursor:pointer; display:flex; align-items:center; justify-content:center; }
.ctrl-btn.del { border-color:rgba(255,110,92,.4); color:var(--coral); }

.chk-btn { width:30px; height:30px; border-radius:50%; flex-shrink:0; border:2px solid var(--b1); background:transparent; display:flex; align-items:center; justify-content:center; cursor:pointer; transition:all .18s; color:transparent; font-size:15px; margin-top:1px; }
.chk-btn.done { background:var(--green); border-color:var(--green); color:#000; }

.ex-body { flex:1; min-width:0; }
.ex-name { font-size:14px; font-weight:600; line-height:1.3; margin-bottom:5px; }
.ex-meta { display:flex; gap:11px; flex-wrap:wrap; margin-bottom:4px; }
.ex-meta span { font-size:12px; color:var(--t2); }
.ex-tip  { font-size:12px; color:var(--t2); font-style:italic; line-height:1.5; }

.w-wrap { margin-top:11px; padding-top:11px; border-top:1px solid var(--b0); display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
.w-lbl  { font-size:12px; font-weight:600; color:var(--t2); min-width:54px; flex-shrink:0; }
.w-ctrl { display:flex; align-items:stretch; background:var(--bg3); border:1px solid var(--b1); border-radius:var(--rs); overflow:hidden; flex-shrink:0; }
.w-btn  { width:48px; height:44px; background:transparent; border:none; color:var(--t0); font-size:24px; font-weight:300; cursor:pointer; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
.w-btn:active { background:var(--bg4); }
.w-mid  { display:flex; align-items:center; justify-content:center; gap:4px; border-left:1px solid var(--b0); border-right:1px solid var(--b0); height:44px; padding:0 8px; min-width:82px; }
.w-val-input {
  width:56px; background:transparent; border:none; outline:none;
  color:var(--t0); font-size:17px; font-weight:700;
  text-align:center; font-family:inherit;
  -webkit-appearance:none; appearance:none; padding:0;
  caret-color:var(--blue);
}
.w-val-input::-webkit-inner-spin-button,
.w-val-input::-webkit-outer-spin-button { -webkit-appearance:none; }
.w-val-input:focus { color:var(--blue); }
.w-unit { font-size:12px; color:var(--t2); font-weight:500; }
.w-right { display:flex; flex-direction:column; align-items:flex-end; gap:3px; margin-left:auto; }
.w-date  { font-size:11px; color:var(--t2); }

var SK_W="tp_w7",SK_PR="tp_pr7",SK_EX="tp_ex7",SK_HIST="tp_hist7",SK_BW="tp_bw7";

/* ═══ STATE ═══ */
var screen="home",active="mo",statTab="cal",editMode=false,addOpen=false,manageEditId=null,addDayOpen=false,manageDayId=null,manageEditExIdx=null,manageAddExOpen=false;null,manageEditExIdx=null,manageAddExOpen=false;

/* ── Timer ── */
function parseRestSec(p){
  if(!p||p==="–")return 60;
  var rng=p.match(/(\d+)[–-](\d+)\s*min/i);if(rng)return Math.round((+rng[1]+ +rng[2])/2)*60;
  var mn=p.match(/(\d+)\s*min/i);if(mn)return parseInt(mn[1])*60;
  var sc=p.match(/(\d+)\s*s\b/i);if(sc)return parseInt(sc[1]);
  return 60;
}
function startTimer(seconds,label){
  if(timerInterval)clearInterval(timerInterval);
  timerTotal=seconds;timerRemaining=seconds;timerLabel=label||"Pause";
  var bar=document.getElementById("timer-bar");
  if(bar)bar.style.display="block";
  updateTimerDisplay();
  timerInterval=setInterval(function(){
    timerRemaining--;
    if(timerRemaining<=0){
      clearInterval(timerInterval);timerInterval=null;timerRemaining=0;
      updateTimerDisplay();
      if(navigator.vibrate)navigator.vibrate([200,100,200,100,300]);
      setTimeout(function(){var b=document.getElementById("timer-bar");if(b)b.style.display="none";},2500);
    } else updateTimerDisplay();
  },1000);
}
function stopTimer(){
  if(timerInterval)clearInterval(timerInterval);timerInterval=null;
  var b=document.getElementById("timer-bar");if(b)b.style.display="none";
}
function updateTimerDisplay(){
  var m=Math.floor(timerRemaining/60),s=timerRemaining%60;
  var vEl=document.getElementById("timer-val");
  var lEl=document.getElementById("timer-lbl");
  var pEl=document.getElementById("timer-prog-fill");
  if(vEl){vEl.textContent=m+":"+(s<10?"0":"")+s;vEl.style.color=timerRemaining<=5?"var(--coral)":timerRemaining<=10?"var(--amber)":"var(--t0)";}
  if(lEl)lEl.textContent=timerLabel+(timerRemaining>0?" · noch "+timerRemaining+"s":" · Weiter! 🎯");
  if(pEl&&timerTotal>0)pEl.style.width=(timerRemaining/timerTotal*100)+"%";
}

/* ── Set tracking ── */
function goExDetail(exId){ detailExId=exId; detailDayId=active; screen="exDetail"; renderApp(); }
function goBackToPlan(){ screen="plan"; detailExId=null; renderApp(); }

function renderExDetail(){
  var ef=getEffDay(detailDayId),c=C[ef.color];
  var list=EX[detailDayId]||[], ex=null;
  for(var i=0;i<list.length;i++){if(list[i].id===detailExId){ex=list[i];break;}}
  if(!ex){goBackToPlan();return;}
  var wObj=W[ex.id], wVal=wObj?wObj.w:0, isPR=PR[ex.id]&&wVal>0&&wVal===PR[ex.id];
  var noW=noWeight(ex,ef.type);
  var dateStr=wObj?fmtDate(wObj.d):"noch nicht gesetzt";

  /* header */
  var hl=document.getElementById("hdr-left");
  if(hl)hl.innerHTML='<button class="back-btn" onclick="goBackToPlan()">‹ '+escHtml(ef.title)+'</button>';

  initExSets(ex.id,ex);
  var restSec=parseRestSec(ex.p);

  var h='';

  /* Exercise header card */
  h+='<div style="background:var(--bg2);border:1px solid var(--b0);border-left:4px solid '+c.m+';border-radius:var(--r);padding:14px 15px;margin-bottom:13px;box-shadow:0 2px 14px rgba(0,0,30,0.65)">'
    +'<div style="font-size:18px;font-weight:700;color:var(--t0);letter-spacing:-.2px;margin-bottom:7px">'+escHtml(ex.n)+'</div>'
    +'<div style="display:flex;gap:12px;flex-wrap:wrap">'
    +(typeof ex.s==="number"&&ex.s>1?'<span style="font-size:12px;color:var(--t2)">📋 '+ex.s+' Sätze</span>':ex.s!=="–"?'<span style="font-size:12px;color:var(--t2)">📋 '+ex.s+'×</span>':'')
    +'<span style="font-size:12px;color:var(--t2)">🔁 '+escHtml(ex.r)+'</span>'
    +(ex.p&&ex.p!=="–"?'<span style="font-size:12px;color:var(--t2)">⏱ '+escHtml(ex.p)+'</span>':'')
    +'</div>'
    +(ex.tip?'<div style="font-size:12px;color:var(--t2);font-style:italic;margin-top:8px;line-height:1.5">'+escHtml(ex.tip)+'</div>':'')
    +'</div>';

  /* Weight control */
  if(!noW){
    h+='<div style="background:var(--bg2);border:1px solid var(--b0);border-radius:var(--r);padding:13px 14px;margin-bottom:13px;box-shadow:0 2px 14px rgba(0,0,30,0.65)">'
      +'<div style="font-size:11px;font-weight:600;color:var(--t2);text-transform:uppercase;letter-spacing:.05em;margin-bottom:10px">Arbeitsgewicht</div>'
      +'<div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">'
      +'<div class="w-ctrl"><button class="w-btn" onclick="adj(\''+ex.id+'\',-1)">−</button><div class="w-mid"><input class="w-val-input" id="wv_'+ex.id+'" type="text" inputmode="decimal" autocomplete="off" value="'+fmtW(wVal)+'" onblur="setWeight(\''+ex.id+'\',this.value)" onclick="this.select()"><span class="w-unit">kg</span></div><button class="w-btn" onclick="adj(\''+ex.id+'\',1)">+</button></div>'
      +'<div style="display:flex;flex-direction:column;gap:3px;margin-left:auto">'
      +'<span class="w-date" id="wd_'+ex.id+'">'+dateStr+'</span>'
      +'<span class="pr-badge" id="pr_'+ex.id+'" style="display:'+(isPR?"inline-flex":"none")+'">🏆 PR</span>'
      +'</div></div>'
      +'<div style="font-size:11px;color:var(--t2);margin-top:6px">Schritt: 0,5 kg · '+(PR[ex.id]?'PR: '+fmtW(PR[ex.id])+' kg':'Noch kein PR')+'</div>'
      +'</div>';
  }

  /* Set tracking */
  h+='<div style="background:var(--bg2);border:1px solid var(--b0);border-radius:var(--r);padding:13px 14px;margin-bottom:13px;box-shadow:0 2px 14px rgba(0,0,30,0.65)">'
    +'<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">'
    +'<span style="font-size:11px;font-weight:600;color:var(--t2);text-transform:uppercase;letter-spacing:.05em">Sätze verfolgen</span>'
    +'<button onclick="resetSets(\''+ex.id+'\')" style="font-size:11px;color:var(--t2);background:none;border:none;cursor:pointer">↺ Zurücksetzen</button>'
    +'</div>';

  var sets=SESSION_SETS[ex.id]||[];
  h+='<div id="setrows_'+ex.id+'">';
  sets.forEach(function(s,i){h+=buildSetRow(ex.id,i,s,restSec);});
  h+='<button class="set-add-btn" onclick="addSet(\''+ex.id+'\')">+ Satz hinzufügen</button>'
    +'</div>'
    +'</div>';

  /* Übung abschließen */
  var ef2=getEffDay(detailDayId),c2=C[ef2.color];
  h+='<button onclick="completeExercise(\''+ex.id+'\')" style="width:100%;padding:14px;background:'+c2.m+';border:none;border-radius:var(--rs);color:#000;font-size:15px;font-weight:700;font-family:inherit;cursor:pointer;margin-bottom:6px">✓ Übung abschließen & zurück</button>';

  document.getElementById("page").innerHTML=h;
}

function findExById(exId){var l=EX[active]||[];for(var i=0;i<l.length;i++){if(l[i].id===exId)return l[i];}return null;}
function initExSets(exId,ex){
  if(SESSION_SETS[exId])return;
  var n=typeof ex.s==="number"?ex.s:3;
  var w=W[exId]?fmtW(W[exId].w):"0";
  var rMatch=String(ex.r).match(/(\d+)/);var r=rMatch?rMatch[1]:"10";
  SESSION_SETS[exId]=[];
  for(var i=0;i<n;i++)SESSION_SETS[exId].push({w:w,r:r,done:false});
}
function toggleExDetail(exId){
  var ex=findExById(exId);if(!ex)return;
  var el=document.getElementById("sets_"+exId);if(!el)return;
  if(expandedEx===exId){
    expandedEx=null;el.style.display="none";
    var tog=document.getElementById("tog_"+exId);if(tog)tog.textContent="▼";
  } else {
    if(expandedEx){
      var prev=document.getElementById("sets_"+expandedEx);if(prev)prev.style.display="none";
      var pt=document.getElementById("tog_"+expandedEx);if(pt)pt.textContent="▼";
    }
    expandedEx=exId;
    initExSets(exId,ex);
    el.innerHTML=buildSetDetail(exId,ex);
    el.style.display="block";
    var tog=document.getElementById("tog_"+exId);if(tog)tog.textContent="▲";
  }
}
function buildSetDetail(exId,ex){
  var sets=SESSION_SETS[exId]||[];
  var restSec=parseRestSec(ex.p);
  var h='<div class="set-detail">'
    +'<div class="set-detail-hdr"><span class="set-detail-title">Sätze verfolgen</span>'
    +'<button onclick="resetSets(\''+exId+'\')" style="font-size:11px;color:var(--t2);background:none;border:none;cursor:pointer">↺ Zurücksetzen</button></div>';
  sets.forEach(function(s,i){h+=buildSetRow(exId,i,s,restSec);});
  h+='<button class="set-add-btn" onclick="addSet(\''+exId+'\')">+ Satz hinzufügen</button></div>';
  return h;
}
function buildSetRow(exId,i,s,restSec){
  return '<div id="sr_'+exId+'_'+i+'" class="set-row'+(s.done?" done":"")+'">'
    +'<span class="set-num">'+(i+1)+'</span>'
    +'<input id="sw_'+exId+'_'+i+'" class="set-inp" type="text" inputmode="decimal" autocomplete="off" value="'+escHtml(String(s.w))+'" style="width:52px" onclick="this.select()" onblur="saveSetW(\''+exId+'\','+i+',this.value)">'
    +'<span class="set-unit">kg</span>'
    +'<span class="set-unit">×</span>'
    +'<input id="sr2_'+exId+'_'+i+'" class="set-inp" type="text" inputmode="numeric" autocomplete="off" value="'+escHtml(String(s.r))+'" style="width:34px" onclick="this.select()" onblur="saveSetR(\''+exId+'\','+i+',this.value)">'
    +'<span class="set-unit">Wdh</span>'
    +'<button class="set-done-btn'+(s.done?" done":"")+'" id="sd_'+exId+'_'+i+'" onclick="toggleSetDone(\''+exId+'\','+i+')">'+(s.done?"✓":"")+'</button>'
    +'<button class="set-timer-btn" onclick="startTimer('+restSec+',\'Satz '+(i+1)+'\')" >⏱</button>'
    +'</div>';
}
function saveSetW(exId,i,val){if(!SESSION_SETS[exId])return;SESSION_SETS[exId][i].w=String(val).replace(",",".").trim()||"0";}
function saveSetR(exId,i,val){if(!SESSION_SETS[exId])return;SESSION_SETS[exId][i].r=String(val).trim()||"0";}
function toggleSetDone(exId,i){
  if(!SESSION_SETS[exId])return;
  SESSION_SETS[exId][i].done=!SESSION_SETS[exId][i].done;
  var row=document.getElementById("sr_"+exId+"_"+i);
  var btn=document.getElementById("sd_"+exId+"_"+i);
  if(row)row.classList.toggle("done",SESSION_SETS[exId][i].done);
  if(btn){btn.classList.toggle("done",SESSION_SETS[exId][i].done);btn.textContent=SESSION_SETS[exId][i].done?"✓":"";}

  /* Gewicht speichern wenn Satz abgehakt wird */
  if(SESSION_SETS[exId][i].done){
    var wRaw=parseFloat(String(SESSION_SETS[exId][i].w).replace(",","."));
    if(!isNaN(wRaw)&&wRaw>0){
      var today=new Date().toISOString().slice(0,10);
      var isPR=!PR[exId]||wRaw>PR[exId];
      if(isPR){PR[exId]=wRaw;sv(SK_PR,PR);}
      W[exId]={w:wRaw,d:today};
      sv(SK_W,W);
      if(!HIST[exId])HIST[exId]=[];
      var lh=HIST[exId][HIST[exId].length-1];
      if(!lh||lh.d!==today){HIST[exId].push({w:wRaw,d:today});sv(SK_HIST,HIST);}
      /* UI auf Detailseite aktualisieren */
      var wInp=document.getElementById("wv_"+exId);
      if(wInp)wInp.value=fmtW(wRaw);
      var wDate=document.getElementById("wd_"+exId);
      if(wDate)wDate.textContent=fmtDate(today);
      var prBadge=document.getElementById("pr_"+exId);
      if(prBadge)prBadge.style.display=isPR?"inline-flex":"none";
      if(isPR)toast("🏆 Neuer PR! "+fmtW(wRaw)+" kg");
      /* Set-Log für Kalenderansicht speichern */
      var logKey=exId+"|"+today;
      SETLOG[logKey]=SESSION_SETS[exId].map(function(s){return{w:s.w,r:s.r,done:s.done};});
      sv(SK_SETLOG,SETLOG);
    }
  }
}
function rebuildSetRows(exId){
  var ex=findExById(exId);if(!ex)return;
  var restSec=parseRestSec(ex.p);
  var sets=SESSION_SETS[exId]||[];
  var h='';
  sets.forEach(function(s,i){h+=buildSetRow(exId,i,s,restSec);});
  h+='<button class="set-add-btn" onclick="addSet(\''+exId+'\')">+ Satz hinzufügen</button>';
  var el=document.getElementById("setrows_"+exId);
  if(el){el.innerHTML=h;return;}
  /* fallback: dropdown container */
  var el2=document.getElementById("sets_"+exId);
  if(el2)el2.innerHTML=buildSetDetail(exId,ex);
}

function addSet(exId){
  var ex=findExById(exId);if(!ex)return;
  if(!SESSION_SETS[exId])initExSets(exId,ex);
  var sets=SESSION_SETS[exId];
  var last=sets.length>0?sets[sets.length-1]:{w:"0",r:"10"};
  sets.push({w:last.w,r:last.r,done:false});
  rebuildSetRows(exId);
}
function resetSets(exId){
  delete SESSION_SETS[exId];
  var ex=findExById(exId);if(!ex)return;
  initExSets(exId,ex);
  rebuildSetRows(exId);
}
function completeExercise(exId){
  CHK[exId]=true;
  goBackToPlan();
}

/* ═══ FRIENDS & FEED ═══ */
function loadFriendsData(){
  if(!currentUser)return;
  db.collection("users").doc(currentUser.uid).collection("friends").get().then(function(snap){
    friends=snap.docs.map(function(d){return d.data();});
    friendsLoaded=true;
    if(screen==="friends")renderFriends();
  }).catch(function(){friendsLoaded=true;if(screen==="friends")renderFriends();});
  db.collection("friendRequests").where("to","==",currentUser.uid).where("status","==","pending").get().then(function(snap){
    pendingRequests=snap.docs.map(function(d){return Object.assign({id:d.id},d.data());});
    if(screen==="friends")renderFriends();
  }).catch(function(){});
}

function loadFeed(){
  if(!friends.length){feedItems=[];feedLoaded=true;if(screen==="friends")renderFriends();return;}
  var promises=friends.slice(0,15).map(function(f){
    return db.collection("users").doc(f.uid).collection("sessions").orderBy("d","desc").limit(7).get().then(function(snap){
      return snap.docs.map(function(d){return Object.assign({},d.data(),{fUid:f.uid,fUser:f.username,fName:f.displayName||f.username,fEmoji:f.avatarEmoji||"💪",fColor:f.avatarColor||"#7b8cff",reactions:d.data().reactions||{}});});
    }).catch(function(){return [];});
  });
  Promise.all(promises).then(function(res){
    feedItems=[];res.forEach(function(r){feedItems=feedItems.concat(r);});
    feedItems.sort(function(a,b){return b.d.localeCompare(a.d);});
    feedLoaded=true;if(screen==="friends")renderFriends();
  });
}

function loadRanking(){
  if(!currentUser||!userProfile)return;
  var prefix=new Date().getFullYear()+"-"+String(new Date().getMonth()+1).padStart(2,"0");
  var myPts=getPoints();
  var myEntry={uid:currentUser.uid,uname:userProfile.username,name:userProfile.displayName||userProfile.username,emoji:userProfile.avatarEmoji||"💪",color:userProfile.avatarColor||"#7b8cff",pts:myPts,rank:getCurRank(myPts),me:true};
  if(!friends.length){rankingItems=[myEntry];if(screen==="friends")renderFriends();return;}
  var promises=friends.map(function(f){
    return db.collection("users").doc(f.uid).collection("sessions").get().then(function(snap){
      var pts=snap.docs.filter(function(d){return d.data().d&&d.data().d.startsWith(prefix);}).length*10;
      return {uid:f.uid,uname:f.username,name:f.displayName||f.username,emoji:f.avatarEmoji||"💪",color:f.avatarColor||"#7b8cff",pts:pts,rank:getCurRank(pts)};
    }).catch(function(){return {uid:f.uid,uname:f.username,name:f.displayName||f.username,emoji:f.avatarEmoji||"💪",color:f.avatarColor||"#7b8cff",pts:0,rank:getCurRank(0)};});
  });
  Promise.all(promises).then(function(res){res.push(myEntry);res.sort(function(a,b){return b.pts-a.pts;});rankingItems=res;if(screen==="friends")renderFriends();});
}

function searchUser(){
  var q=((document.getElementById("friend-search-inp")||{}).value||"").trim().toLowerCase().replace("@","");
  friendSearch=q;
  if(!q||q.length<2){friendSearchError="Mind. 2 Zeichen eingeben.";friendSearchResult=null;renderFriends();return;}
  if(userProfile&&q===userProfile.username){friendSearchError="Das bist du selbst.";friendSearchResult=null;renderFriends();return;}
  friendSearchLoading=true;friendSearchError="";friendSearchResult=null;renderFriends();
  db.collection("usernames").doc(q).get().then(function(doc){
    if(!doc.exists){friendSearchLoading=false;friendSearchError="@"+q+" nicht gefunden.";renderFriends();return;}
    return db.collection("users").doc(doc.data().uid).get().then(function(udoc){
      friendSearchLoading=false;
      if(udoc.exists){var already=friends.some(function(f){return f.uid===udoc.id;});friendSearchResult=Object.assign({uid:udoc.id,alreadyFriend:already},udoc.data());}
      else friendSearchError="Profil nicht gefunden.";
      renderFriends();
    });
  }).catch(function(){friendSearchLoading=false;friendSearchError="Verbindung fehlgeschlagen – Firestore-Regeln prüfen.";renderFriends();});
}

function sendFriendRequest(toUid){
  if(!currentUser||!userProfile)return;
  var p=userProfile;
  db.collection("friendRequests").add({from:currentUser.uid,to:toUid,fromUsername:p.username,fromDisplayName:p.displayName||p.username,fromAvatarEmoji:p.avatarEmoji||"💪",fromAvatarColor:p.avatarColor||"#7b8cff",status:"pending",createdAt:firebase.firestore.FieldValue.serverTimestamp()}).then(function(){
    toast("👊 Anfrage gesendet!");if(friendSearchResult)friendSearchResult.requestSent=true;renderFriends();
  }).catch(function(){toast("Fehler – Firestore-Verbindung prüfen");});
}

function acceptRequest(reqId,fromUid,fromUsername,fromDisplayName,fromEmoji,fromColor){
  if(!currentUser||!userProfile)return;
  var b=db.batch();
  b.set(db.collection("users").doc(currentUser.uid).collection("friends").doc(fromUid),{uid:fromUid,username:fromUsername,displayName:fromDisplayName||fromUsername,avatarEmoji:fromEmoji||"💪",avatarColor:fromColor||"#7b8cff",addedAt:firebase.firestore.FieldValue.serverTimestamp()});
  b.set(db.collection("users").doc(fromUid).collection("friends").doc(currentUser.uid),{uid:currentUser.uid,username:userProfile.username,displayName:userProfile.displayName||userProfile.username,avatarEmoji:userProfile.avatarEmoji||"💪",avatarColor:userProfile.avatarColor||"#7b8cff",addedAt:firebase.firestore.FieldValue.serverTimestamp()});
  b.update(db.collection("friendRequests").doc(reqId),{status:"accepted"});
  b.commit().then(function(){toast("✓ Freund hinzugefügt!");loadFriendsData();}).catch(function(){toast("Fehler – erneut versuchen");});
}

function rejectRequest(reqId){
  db.collection("friendRequests").doc(reqId).update({status:"rejected"}).then(function(){loadFriendsData();toast("Anfrage abgelehnt");}).catch(function(){});
}

function removeFriend(fUid,btn){
  twoStep(btn,function(){
    Promise.all([db.collection("users").doc(currentUser.uid).collection("friends").doc(fUid).delete(),db.collection("users").doc(fUid).collection("friends").doc(currentUser.uid).delete()]).then(function(){loadFriendsData();toast("Freund entfernt");}).catch(function(){});
  });
}

function sendHighFive(fUid,sessionD,sessionDid){
  if(!currentUser||!userProfile)return;
  var key=sessionD+"_"+sessionDid;
  var reaction={};
  reaction["reactions."+currentUser.uid]={emoji:"👊",from:userProfile.username};
  db.collection("users").doc(fUid).collection("sessions").doc(key).update(reaction).then(function(){
    toast("👊 High-Five!");loadFeed();
  }).catch(function(){toast("Fehler beim Senden");});
}

function timeSince(dateStr){
  var d=new Date(dateStr),now=new Date(),diff=Math.floor((now-d)/60000);
  if(diff<1)return"Gerade eben";if(diff<60)return diff+" Min. her";
  if(diff<1440)return Math.floor(diff/60)+" Std. her";
  return Math.floor(diff/1440)+" Tag"+(Math.floor(diff/1440)>1?"e":"")+" her";
}

        +(wVal?'<div style="display:flex;flex-direction:column;align-items:flex-end;flex-shrink:0;gap:3px">'
          +'<span style="font-size:15px;font-weight:700;color:'+c.m+'">'+fmtW(wVal)+' kg</span>'
          +(isPR?'<span style="font-size:10px;font-weight:600;color:var(--gold);background:rgba(255,215,0,.15);padding:1px 6px;border-radius:99px">🏆 PR</span>':'')
          +'</div>':'')
        +'</div>'
        /* meta row */
        +'<div style="display:flex;gap:12px;flex-wrap:wrap;margin-bottom:'+(ex.tip?'6':'0')+'px">'
        +'<span style="font-size:12px;color:var(--t2)">'+ex.s+' Sätze</span>'
        +'<span style="font-size:12px;color:var(--t2)">'+escHtml(ex.r)+' Wdh</span>'
        +(ex.p&&ex.p!=="–"?'<span style="font-size:12px;color:var(--t2)">⏱ '+escHtml(ex.p)+'</span>':'')
        +'</div>'
        +(ex.tip?'<div style="font-size:11px;color:var(--t2);font-style:italic;line-height:1.4">'+escHtml(ex.tip)+'</div>':'')
        /* Set-Log */
        +(function(){
          var key=ex.id+"|"+calDetailDate;
          var log=SETLOG[key];
          if(!log||!log.length)return '';
          var doneSets=log.filter(function(s){return s.done;});
          if(!doneSets.length)return '';
          var chips=doneSets.map(function(s,idx){
            return '<span style="font-size:11px;background:var(--bg3);border:1px solid var(--b0);border-radius:99px;padding:3px 8px;color:var(--t1);white-space:nowrap">'
              +(idx+1)+'. '+escHtml(String(s.w))+' kg × '+escHtml(String(s.r))+'</span>';
          }).join('');
          return '<div style="display:flex;gap:5px;flex-wrap:wrap;margin-top:7px">'+chips+'</div>';
        })()
        +'</div>';
    }
    h+='</div>';
  }

  document.getElementById("page").innerHTML=h;
}

function applyTemplate(tmplId,btn){
  var tmpl=null;
  for(var i=0;i<TEMPLATES.length;i++){if(TEMPLATES[i].id===tmplId){tmpl=TEMPLATES[i];break;}}
  if(!tmpl)return;
  twoStep(btn,function(){
    CDAYS=[]; DCFG={}; DORD=[];
    tmpl.days_data.forEach(function(d){
      CDAYS.push({id:d.id,title:d.title,sub:d.sub,icon:d.icon,type:d.type||"strength",color:d.color||"blue",note:d.note||"",cardio:d.cardio||null,isCustom:true,ex:[]});
      EX[d.id]=d.ex.map(function(ex,i){return{id:d.id+"_"+i,n:ex.n,s:ex.s,r:ex.r,p:ex.p,bw:!!ex.bw,tip:ex.tip||"",custom:false};});
      DORD.push(d.id);
    });
    try{localStorage.setItem(SK_TMPL,tmplId);}catch(e){}
    sv(SK_CDAYS,CDAYS);sv(SK_DCFG,DCFG);sv(SK_DORD,DORD);sv(SK_EX,EX);
    active=DORD[0]; screen="planSelect";
    renderApp(); toast("✓ Plan angewendet!");
  });
}

function getTmplName(){
  try{var id=localStorage.getItem(SK_TMPL);if(!id)return null;for(var i=0;i<TEMPLATES.length;i++){if(TEMPLATES[i].id===id)return TEMPLATES[i].name;}return null;}catch(e){return null;}
}

function buildRankRing(){
  var pts=getPoints(),rank=getCurRank(pts),next=getNextRank(pts);
  var R=64,circ=+(2*Math.PI*R).toFixed(2);
  var pct=next?(pts-rank.min)/(next.min-rank.min):1;
  pct=Math.min(1,Math.max(0,pct));
  var off=+(circ*(1-pct)).toFixed(2);
  var months=["Januar","Februar","März","April","Mai","Juni","Juli","August","September","Oktober","November","Dezember"];
  var now=new Date(),monthName=months[now.getMonth()],mSess=getMonthSessions().length;
  return '<div style="display:flex;flex-direction:column;align-items:center;padding:8px 0 2px;margin-bottom:13px">'
    +'<div style="font-size:11px;font-weight:600;color:var(--t2);text-transform:uppercase;letter-spacing:.07em;margin-bottom:8px">'+monthName+' '+now.getFullYear()+'</div>'
    +'<div style="position:relative;width:164px;height:164px">'
    +'<svg viewBox="0 0 200 200" width="164" height="164" style="transform:rotate(-90deg)">'
    +'<circle cx="100" cy="100" r="'+R+'" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="14"/>'
    +'<circle cx="100" cy="100" r="'+R+'" fill="none" stroke="'+rank.color+'" stroke-width="10" '
    +'stroke-dasharray="'+circ+'" stroke-dashoffset="'+off+'" stroke-linecap="round" '
    +'style="transition:stroke-dashoffset 1.2s cubic-bezier(.4,0,.2,1)"/>'
    +'<circle cx="100" cy="100" r="'+R+'" fill="none" stroke="'+rank.color+'" stroke-width="2" opacity="0.15"/>'
    +'</svg>'
    +'<div style="position:absolute;top:0;left:0;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;pointer-events:none">'
    +'<div style="width:90px;height:90px;border-radius:50%;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;gap:3px">'
    +'<div style="font-size:36px;line-height:1">'+rank.icon+'</div>'
    +'<div style="font-size:16px;font-weight:700;color:'+rank.color+';letter-spacing:-.2px;line-height:1.1">'+rank.name+'</div>'
    +'<div style="font-size:10px;color:var(--t2);margin-top:1px">'+pts+' Pkt</div>'
    +'</div>'
    +'</div></div>'
    +(next
      ?'<div style="font-size:12px;color:var(--t2);margin-top:6px">'+mSess+' Training'+(mSess!==1?'s':'')+' · '+Math.round(pct*100)+'% bis '+next.icon+' '+next.name+'</div>'
      :'<div style="font-size:12px;font-weight:600;margin-top:6px;color:'+rank.color+'">'+mSess+' Trainings · 👑 Höchster Rang!</div>')
    +'<div style="font-size:11px;color:var(--t2);margin-top:4px;opacity:.6">Setzt sich monatlich zurück</div>'
    +'</div>';
}

/* ═══ DAY HELPERS ═══ */
function getBaseDef(did){
  for(var i=0;i<DAYS.length;i++){if(DAYS[i].id===did)return DAYS[i];}
  for(var i=0;i<CDAYS.length;i++){if(CDAYS[i].id===did)return CDAYS[i];}
  return null;
}
function getEffDay(did){
  var b=getBaseDef(did); if(!b)return null;
  var cfg=DCFG[did]||{};
  return {id:did,title:cfg.title||b.title,sub:cfg.sub||b.sub||"",icon:cfg.icon||b.icon||"🏋️",type:b.type||"strength",color:b.color||"blue",cardio:b.cardio,note:cfg.note||b.note||"",isCustom:!!b.isCustom,hidden:!!(cfg.hidden)};
}
function getVisibleDays(){
  var all=DORD.filter(function(did){return !(DCFG[did]&&DCFG[did].hidden);});
  return all.map(getEffDay).filter(Boolean);
}
function initDay(did){
  if(EX[did]) return;
  var b=getBaseDef(did); if(!b)return;
  EX[did]=[];
  var tips=TIPS[did]||[];
  for(var i=0;i<b.ex.length;i++){
    EX[did].push({id:"b_"+did+"_"+i,n:b.ex[i].n,s:b.ex[i].s,r:b.ex[i].r,p:b.ex[i].p,bw:b.ex[i].bw,tip:tips[i]||"",custom:false});
  }
}

/* ═══ WEIGHT / PR / HISTORY ═══ */
function adj(exId,dir){
  var cur=W[exId]?W[exId].w:0;
  var nxt=Math.round((cur+dir*0.5)*10)/10; if(nxt<0)nxt=0;
  var today=new Date().toISOString().slice(0,10);
  W[exId]={w:nxt,d:today}; sv(SK_W,W);
  if(!HIST[exId])HIST[exId]=[];
  var h=HIST[exId];
  if(!h.length||h[h.length-1].d!==today)h.push({w:nxt,d:today});
  else h[h.length-1].w=nxt;
  sv(SK_HIST,HIST);
  var isPR=false;
  if(dir>0&&(!PR[exId]||nxt>PR[exId])){PR[exId]=nxt;sv(SK_PR,PR);isPR=true;}
  var ve=document.getElementById("wv_"+exId);
  var de=document.getElementById("wd_"+exId);
  var pe=document.getElementById("pr_"+exId);
  if(ve)ve.value=fmtW(nxt);
  if(de)de.textContent=fmtDate(today);
  if(pe){if(PR[exId]&&nxt===PR[exId]){pe.style.display="inline-flex";if(isPR){pe.classList.add("pr-flash");setTimeout(function(){pe.classList.remove("pr-flash");},600);}}else pe.style.display="none";}
  toast(isPR?"🏆 Neuer PR!":"✓ "+fmtW(nxt)+" kg");
}
function fmtW(v){return(v%1===0)?v.toFixed(1):String(v);}
function setWeight(exId,rawVal){
  var v=parseFloat(String(rawVal).replace(",","."));
  var inp=document.getElementById("wv_"+exId);
  if(isNaN(v)||v<0){
    if(inp&&W[exId])inp.value=fmtW(W[exId].w);
    return;
  }
  v=Math.round(v*10)/10;
  var cur=W[exId]?W[exId].w:0;
  if(v===cur)return;
  var today=new Date().toISOString().slice(0,10);
  W[exId]={w:v,d:today}; saveW();
  if(!HIST[exId])HIST[exId]=[];
  var h=HIST[exId];
  if(!h.length||h[h.length-1].d!==today)h.push({w:v,d:today});
  else h[h.length-1].w=v;
  saveHIST();
  var isPR=false;
  if(!PR[exId]||v>PR[exId]){PR[exId]=v;savePR();isPR=true;}
  if(inp)inp.value=fmtW(v);
  var de=document.getElementById("wd_"+exId);
  var pe=document.getElementById("pr_"+exId);
  if(de)de.textContent=fmtDate(today);
  if(pe){if(PR[exId]&&v===PR[exId]){pe.style.display="inline-flex";if(isPR){pe.classList.add("pr-flash");setTimeout(function(){pe.classList.remove("pr-flash");},600);}}else pe.style.display="none";}
  toast(isPR?"🏆 Neuer PR!":"✓ "+fmtW(v)+" kg");
}
function fmtDate(iso){if(!iso)return"";return new Date(iso).toLocaleDateString("de-DE",{day:"numeric",month:"short"});}
function fmtDateShort(iso){if(!iso)return"";var d=new Date(iso);return d.getDate()+"."+(d.getMonth()+1)+".";}

function launchConfetti(){
  var canvas=document.getElementById("cnf");
  var cel=document.getElementById("cel");
  if(!canvas)return;
  canvas.width=window.innerWidth; canvas.height=window.innerHeight;
  canvas.style.display="block";
  cel.style.opacity="1"; cel.style.display="flex";
  cel.innerHTML='<div style="background:rgba(14,14,18,0.88);border:1.5px solid var(--green-b);border-radius:20px;padding:26px 36px;text-align:center;box-shadow:0 0 40px rgba(64,230,138,0.15)">'
    +'<div style="font-size:44px;margin-bottom:8px">🎉</div>'
    +'<div style="font-size:22px;font-weight:700;color:#f2f2f4;letter-spacing:-.3px">Gut gemacht!</div>'
    +'<div style="font-size:13px;color:#9494a4;margin-top:5px">Training abgeschlossen</div>'
    +'</div>';
  var ctx=canvas.getContext("2d");
  var cols=["#60aaff","#40e68a","#f7ad28","#ff6e5c","#30dfc8","#ffd700","#b580ff","#ffffff"];
  var pts=[];
  for(var i=0;i<140;i++){
    pts.push({
      x:Math.random()*canvas.width, y:-10-Math.random()*120,
      vx:(Math.random()-.5)*5, vy:1.5+Math.random()*4,
      w:5+Math.random()*8, h:4+Math.random()*5,
      col:cols[Math.floor(Math.random()*cols.length)],
      rot:Math.random()*Math.PI*2, rs:(Math.random()-.5)*.18,
      circle:Math.random()>.6
    });
  }
  var t0=Date.now(), dur=3800;
  function draw(){
    var el=Date.now()-t0;
    var fade=el>dur-900?1-(el-(dur-900))/900:1;
    ctx.clearRect(0,0,canvas.width,canvas.height);
    for(var i=0;i<pts.length;i++){
      var p=pts[i];
      p.x+=p.vx; p.y+=p.vy; p.vy+=0.07; p.vx*=0.99; p.rot+=p.rs;
      ctx.save(); ctx.globalAlpha=fade; ctx.fillStyle=p.col;
      ctx.translate(p.x,p.y); ctx.rotate(p.rot);
      if(p.circle){ctx.beginPath();ctx.arc(0,0,p.w/2,0,Math.PI*2);ctx.fill();}
      else ctx.fillRect(-p.w/2,-p.h/2,p.w,p.h);
      ctx.restore();
    }
    if(el<dur) requestAnimationFrame(draw);
    else{canvas.style.display="none";ctx.clearRect(0,0,canvas.width,canvas.height);}
  }
  draw();
  setTimeout(function(){
    cel.style.opacity="0";
    setTimeout(function(){cel.style.display="none";cel.style.opacity="1";},750);
  },2200);
}

  sv(SK_SESS,SESSIONS);
  launchConfetti();

function sessThisWeek(){
  var now=new Date(),dow=(now.getDay()+6)%7;
  var mon=new Date(now); mon.setDate(now.getDate()-dow); mon.setHours(0,0,0,0);
  return SESSIONS.filter(function(s){return new Date(s.d)>=mon;});
}
function lastSession(){return SESSIONS.length?SESSIONS[SESSIONS.length-1]:null;}

function getStreak(){
  var now=new Date(),dow=(now.getDay()+6)%7;
  var mon=new Date(now); mon.setDate(now.getDate()-dow); mon.setHours(0,0,0,0);
  function weekHas(m){
    var ms=m.toISOString().slice(0,10);
    var me=new Date(m); me.setDate(m.getDate()+7);
    var mes=me.toISOString().slice(0,10);
    return SESSIONS.some(function(s){return s.d>=ms&&s.d<mes;});
  }
  var streak=0,cur=new Date(mon);
  if(weekHas(cur)){streak++;}
  cur.setDate(cur.getDate()-7);
  while(streak<104){
    if(weekHas(cur)){streak++;cur.setDate(cur.getDate()-7);}
    else break;
  }
  return streak;
}

function getNextDay(){
  var vd=getVisibleDays(); if(!vd.length)return null;
  if(!SESSIONS.length)return vd[0];
  var lastDid=SESSIONS[SESSIONS.length-1].did;
  var idx=-1;
  for(var i=0;i<vd.length;i++){if(vd[i].id===lastDid){idx=i;break;}}
  if(idx===-1)return vd[0];
  return vd[(idx+1)%vd.length];
}

/* ═══ SVG CHART ═══ */
function lineChart(entries,color){
  if(!entries||entries.length<2)return'<div class="no-data">Mindestens 2 Einträge für Chart erforderlich</div>';
  var W=320,H=155,pl=46,pr=14,pt=14,pb=30;
  var cw=W-pl-pr,ch=H-pt-pb;
  var xs=entries.map(function(e){return new Date(e.d).getTime();});
  var ys=entries.map(function(e){return e.w;});
  var minX=Math.min.apply(null,xs),maxX=Math.max.apply(null,xs);
  var minY=Math.min.apply(null,ys),maxY=Math.max.apply(null,ys);
  var pad=(maxY-minY)*0.15||1;minY-=pad;maxY+=pad;
  var rx=maxX-minX||1,ry=maxY-minY||1;
  function sx(x){return pl+(x-minX)/rx*cw;}
  function sy(y){return pt+ch-(y-minY)/ry*ch;}
  var grid="",step=(maxY-minY)/3;
  for(var i=0;i<=3;i++){var yv=minY+step*i,yp=sy(yv);grid+='<line x1="'+pl+'" y1="'+yp+'" x2="'+(pl+cw)+'" y2="'+yp+'" stroke="rgba(128,128,128,0.15)" stroke-width="1"/><text x="'+(pl-4)+'" y="'+(yp+3.5)+'" font-size="9" fill="rgba(128,128,128,0.5)" text-anchor="end">'+yv.toFixed(1)+'</text>';}
  var xlabels="",xstep=Math.max(1,Math.floor(entries.length/4));
  for(var i=0;i<entries.length;i+=xstep)xlabels+='<text x="'+sx(xs[i])+'" y="'+(pt+ch+18)+'" font-size="9" fill="rgba(128,128,128,0.5)" text-anchor="middle">'+fmtDateShort(entries[i].d)+'</text>';
  var pts=entries.map(function(e,i){return sx(xs[i])+","+sy(e.w);});
  var lp="M"+pts.join(" L"),ap=lp+" L"+sx(xs[xs.length-1])+","+(pt+ch)+" L"+sx(xs[0])+","+(pt+ch)+" Z";
  var maxW=Math.max.apply(null,ys);
  var dots=entries.map(function(e,i){var isPR=e.w===maxW;return'<circle cx="'+sx(xs[i])+'" cy="'+sy(e.w)+'" r="'+(isPR?4.5:3)+'" fill="'+(isPR?"var(--gold)":color)+'"'+( isPR?' stroke="rgba(255,215,0,0.3)" stroke-width="3"':"")+'/>';}).join("");
  return'<svg width="100%" viewBox="0 0 '+W+' '+H+'" xmlns="http://www.w3.org/2000/svg" style="overflow:visible"><defs><linearGradient id="cg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="'+color+'" stop-opacity="0.25"/><stop offset="100%" stop-color="'+color+'" stop-opacity="0"/></linearGradient></defs>'+grid+xlabels+'<path d="'+ap+'" fill="url(#cg)"/><path d="'+lp+'" fill="none" stroke="'+color+'" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>'+dots+'</svg>';
}

function renderHome(){

    else weekDots+='<div class="week-dot" style="'+(isToday?"border-color:var(--blue)":"")+'">&nbsp;</div>';
    weekDots+='</div>';
  }
  weekDots+='</div>';

  var nc=nextDay?C[nextDay.color]:C.blue;
  var streakFlames=streak===0?"":streak<3?"🔥":streak<8?"🔥🔥":"🔥🔥🔥";
  var h='';

  /* 1 ── Rank ring */
  h+=buildRankRing();

  /* 2 ── Week strip – tappable → Kalender */
  h+='<div class="week-strip" onclick="goStatsCal()" style="margin-bottom:12px;cursor:pointer"><div class="week-title" style="display:flex;align-items:center;justify-content:space-between">Diese Woche · '+wSess.length+' Training'+(wSess.length!==1?"s":"")+'<span style="font-size:11px;color:var(--t2);opacity:.7">Kalender ›</span></div>'+weekDots+'</div>';

  /* 3 ── Streak (left) + Als nächstes / Schnellstart (right) */
  h+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:13px">';

  /* Streak */

function saveManageEx(did,idx){
  var list=EX[did]||[]; if(idx<0||idx>=list.length)return;
  var name=(document.getElementById("eex-name")||{}).value||"";
  var sets=(document.getElementById("eex-sets")||{}).value||"3";
  var reps=(document.getElementById("eex-reps")||{}).value||"";
  var rest=(document.getElementById("eex-rest")||{}).value||"";
  var tip =(document.getElementById("eex-tip") ||{}).value||"";
  if(!name.trim()){alert("Bitte Übungsname eingeben.");return;}
  list[idx].n=name.trim();
  list[idx].s=parseInt(sets)||3;
  list[idx].r=reps.trim();
  list[idx].p=rest.trim();
  list[idx].tip=tip.trim();
  EX[did]=list; sv(SK_EX,EX);
  manageEditExIdx=null; renderManageExercises(did); toast("✓ Übung gespeichert");
}

function deleteManageEx(did,idx,btn){
  twoStep(btn,function(){
    var list=EX[did]||[]; list.splice(idx,1); EX[did]=list;
    sv(SK_EX,EX); renderManageExercises(did); toast("↺ Übung gelöscht");
  });
}

function moveManageEx(did,idx,dir){
  var list=EX[did]||[],n=idx+dir;
  if(n<0||n>=list.length)return;
  var t=list[idx];list[idx]=list[n];list[n]=t;
  EX[did]=list; sv(SK_EX,EX); renderManageExercises(did);
}

function addManageEx(did){
  var name=(document.getElementById("nex-name")||{}).value||"";
  var sets=(document.getElementById("nex-sets")||{}).value||"3";
  var reps=(document.getElementById("nex-reps")||{}).value||"10–12";
  var rest=(document.getElementById("nex-rest")||{}).value||"60 s";
  var tip =(document.getElementById("nex-tip") ||{}).value||"";
  if(!name.trim()){alert("Bitte Übungsname eingeben.");return;}
  if(!EX[did])EX[did]=[];
  EX[did].push({id:"c_"+Date.now(),n:name.trim(),s:parseInt(sets)||3,r:reps.trim(),p:rest.trim(),tip:tip.trim(),bw:false,custom:true});
  sv(SK_EX,EX); manageAddExOpen=false; renderManageExercises(did); toast("✓ Übung hinzugefügt");
}

function escHtml(s){return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}

/* ─ two-step confirmation (iOS blocks confirm()) ─ */
function twoStep(btn, action) {
  if(btn._pending) {
    clearTimeout(btn._timer);
    delete btn._pending;
    btn.innerHTML = btn._orig;
    btn.style.cssText = btn._origStyle;
    action();
  } else {
    btn._pending = true;
    btn._orig = btn.innerHTML;
    btn._origStyle = btn.style.cssText || "";
    btn.innerHTML = "Sicher?";
    btn.style.color = "var(--coral)";
    btn.style.borderColor = "rgba(255,110,92,0.5)";
    btn.style.fontSize = "11px";
    btn._timer = setTimeout(function(){
      if(btn._pending){ delete btn._pending; btn.innerHTML=btn._orig; btn.style.cssText=btn._origStyle; }
    }, 3000);
  }
}

function deleteDay(did){
  var btn=event.currentTarget||event.target;
  twoStep(btn,function(){
    var isCustom=CDAYS.some(function(d){return d.id===did;});
    if(isCustom){
      CDAYS=CDAYS.filter(function(d){return d.id!==did;});
      delete EX[did]; sv(SK_CDAYS,CDAYS); sv(SK_EX,EX);
    } else {
      if(!DCFG[did])DCFG[did]={};
      DCFG[did].hidden=true; sv(SK_DCFG,DCFG);
    }
    DORD=DORD.filter(function(id){return id!==did;});
    sv(SK_DORD,DORD); renderManage(); toast("↺ Tag gelöscht");
  });
}

function delSession(date, did, btn){
  twoStep(btn, function(){
    SESSIONS=SESSIONS.filter(function(s){return!(s.d===date&&s.did===did);});
    sv(SK_SESS,SESSIONS);

function renderCal(){
  var months=["Januar","Februar","März","April","Mai","Juni","Juli","August","September","Oktober","November","Dezember"];
  var first=new Date(calYear,calMonth,1),last=new Date(calYear,calMonth+1,0);
  var startDow=(first.getDay()+6)%7;

  /* ── Rank for this month ── */
  var mPrefix=calYear+"-"+String(calMonth+1).padStart(2,"0");

  mSess.sort(function(a,b){return a.d.localeCompare(b.d);});

  var mRank=getCurRank(mPts),mNext=getNextRank(mPts);

    +(mNext&&mSess.length>0?'<div style="font-size:11px;color:var(--t2);margin-top:2px">'+Math.round(mPct*100)+'% bis '+mNext.icon+' '+mNext.name+'</div>':'')

    var dStr=calYear+"-"+String(calMonth+1).padStart(2,"0")+"-"+String(d).padStart(2,"0");

function renderProg(){
  var opts='<option value="">Übung wählen...</option>';
  var vd=getVisibleDays();
  for(var di=0;di<vd.length;di++){
    var ef=vd[di],list=EX[ef.id]||[];
    var grp='<optgroup label="'+ef.title+'">',added=false;
    for(var ei=0;ei<list.length;ei++){var ex=list[ei];if(!noWeight(ex,ef.type)){grp+='<option value="'+ex.id+'"'+(selEx===ex.id?" selected":"")+'>'+ex.n+'</option>';added=true;}}
    grp+='</optgroup>'; if(added)opts+=grp;
  }
  var h='<div class="stat-card"><div class="stat-card-title">Übung auswählen</div><select class="ex-select" onchange="selEx=this.value;renderStats()">'+opts+'</select></div>';
  if(selEx&&HIST[selEx]&&HIST[selEx].length>=2){
    var entries=HIST[selEx],first=entries[0],last=entries[entries.length-1];
    var diff=Math.round((last.w-first.w)*10)/10;
    var weeks=Math.max(1,Math.round((new Date(last.d)-new Date(first.d))/(7*24*3600*1000)));
    h+='<div class="stat-card"><div class="stat-card-title">Verlauf'+(PR[selEx]?' · PR: '+fmtW(PR[selEx])+' kg 🏆':'')+'</div><div class="chart-wrap">'+lineChart(entries,"var(--blue)")+'</div></div>';
    h+='<div class="stat-card"><div class="stat-card-title">Kennzahlen</div>'
      +'<div class="info-row"><span class="info-row-label">Startgewicht</span><span class="info-row-val">'+fmtW(first.w)+' kg</span></div>'
      +'<div class="info-row"><span class="info-row-label">Aktuell</span><span class="info-row-val" style="color:var(--blue)">'+fmtW(last.w)+' kg</span></div>'
      +'<div class="info-row"><span class="info-row-label">Zuwachs gesamt</span><span class="info-row-val" style="color:'+(diff>=0?"var(--green)":"var(--coral)")+'">'+(diff>0?"+":"")+diff+' kg</span></div>'
      +'<div class="info-row" style="border-bottom:none"><span class="info-row-label">Ø pro Woche</span><span class="info-row-val">'+(Math.round(diff/weeks*100)/100>0?"+":"")+Math.round(diff/weeks*100)/100+' kg</span></div></div>';
  } else if(selEx)h+='<div class="no-data" style="color:var(--t2)">Mindestens 2 Trainings mit dieser Übung erforderlich</div>';

function renderPRBoard(){
  var h='',hasPR=false,vd=getVisibleDays();
  for(var di=0;di<vd.length;di++){
    var ef=vd[di],list=EX[ef.id]||[],c=C[ef.color],rows='';
    for(var ei=0;ei<list.length;ei++){var ex=list[ei];if(noWeight(ex,ef.type))continue;var pv=PR[ex.id];if(pv){rows+='<div class="pr-row"><span class="pr-name">'+ex.n+'</span><span class="pr-val">🏆 '+fmtW(pv)+' kg</span></div>';hasPR=true;}}
    if(rows)h+='<div class="pr-group" style="color:'+c.m+'">'+ef.icon+' '+ef.title+'</div><div class="stat-card" style="border-left:3px solid '+c.m+';padding:0 14px">'+rows+'</div>';
  }
  if(!hasPR)h='<div class="no-data" style="color:var(--t2);padding:50px 0">Noch keine PRs gesetzt.<br>Trage Gewichte im Trainingsplan ein.</div>';
  return h;
}

function renderORM(){
  function rn(r){var m=String(r).match(/(\d+)/);return m?parseInt(m[1]):10;}
  var h='<div class="stat-card"><div class="stat-card-title">Geschätztes 1-Wiederholungsmaximum</div><div style="font-size:12px;color:var(--t2);margin-bottom:12px">Epley-Formel: 1RM = Gewicht × (1 + Wdh / 30)</div>';
  var hasData=false,vd=getVisibleDays();
  for(var di=0;di<vd.length;di++){
    var ef=vd[di],list=EX[ef.id]||[],c=C[ef.color],rows='';
    for(var ei=0;ei<list.length;ei++){var ex=list[ei];if(noWeight(ex,ef.type))continue;var wo=W[ex.id];if(!wo||!wo.w)continue;var orm=Math.round(wo.w*(1+rn(ex.r)/30)*10)/10;rows+='<div class="orm-row"><span class="orm-name">'+ex.n+'</span><span class="orm-val">~'+fmtW(orm)+' kg</span></div>';hasData=true;}
    if(rows)h+='<div class="pr-group" style="color:'+c.m+'">'+ef.icon+' '+ef.title+'</div>'+rows;
  }
  if(!hasData)h+='<div class="no-data" style="color:var(--t2);padding:20px 0">Noch keine Gewichte eingetragen.</div>';
  h+='</div><div class="stat-card"><div class="stat-card-title">ℹ Hinweis</div><div style="font-size:13px;color:var(--t1);line-height:1.6">Schätzung basiert auf aktuellem Arbeitsgewicht + Wdh-Zahl. Genauer bei 4–10 Wdh.</div></div>';
  return h;
}

function getAuthError(code){
  var m={
    "auth/email-already-in-use":"E-Mail bereits registriert.",
    "auth/invalid-email":"Ungültige E-Mail.",
    "auth/weak-password":"Passwort zu schwach (mind. 6 Zeichen).",
    "auth/user-not-found":"Kein Konto mit dieser E-Mail.",
    "auth/wrong-password":"Falsches Passwort.",
    "auth/invalid-credential":"E-Mail oder Passwort falsch.",
    "auth/too-many-requests":"Zu viele Versuche – kurz warten.",
    "unavailable":"Datenbankverbindung fehlgeschlagen. Bitte Firebase-Regeln prüfen (Firestore → Regeln → 'allow read, write: if true').",
    "permission-denied":"Zugriff verweigert. Bitte Firebase-Regeln auf 'if true' setzen.",
    "unauthenticated":"Nicht eingeloggt – bitte Seite neu laden."
  };
  return m[code]||("Fehler: "+code);
}
function doRegister(){
  if(authLoading)return;
  var u=((document.getElementById("reg-user")||{}).value||"").replace("@","").trim().toLowerCase();
  var e=((document.getElementById("reg-email")||{}).value||"").trim();
  var p=(document.getElementById("reg-pw")||{}).value||"";
  if(u.length<3){authError="Benutzername mind. 3 Zeichen.";renderAuth();return;}
  if(!/^[a-z0-9_]+$/.test(u)){authError="Nur Buchstaben, Zahlen und _ erlaubt.";renderAuth();return;}
  if(!e.includes("@")){authError="Bitte gültige E-Mail eingeben.";renderAuth();return;}
  if(p.length<6){authError="Passwort mind. 6 Zeichen.";renderAuth();return;}
  authLoading=true;authError="";renderAuth();

  fAuth.createUserWithEmailAndPassword(e,p).then(function(cred){
    var uid=cred.user.uid;
    currentUser=cred.user;
    var prof={username:u,displayName:u,avatarEmoji:selAvatarE,avatarColor:selAvatarC,email:e,uid:uid,privacy:{visibility:"friends",showWeights:true}};
    /* Immer lokal speichern */
    userProfile=prof;
    saveProfileLocal(prof);
    authLoading=false;
    /* Firestore im Hintergrund versuchen – blockiert den Login nicht */
    try{
      db.collection("users").doc(uid).set(Object.assign({},prof,{createdAt:firebase.firestore.FieldValue.serverTimestamp()})).catch(function(){});
      db.collection("usernames").doc(u).set({uid:uid}).catch(function(){});
      syncLocalDataToFirestore(uid);
    }catch(ex){}
    var hdrEl=document.getElementById("hdr"),navEl=document.getElementById("bottom-nav");
    if(hdrEl)hdrEl.style.display="";if(navEl)navEl.style.display="";
    screen="home";renderApp();
  }).catch(function(err){
    authLoading=false;authError=getAuthError((err&&err.code)||"");renderAuth();
  });
}
function doLogin(){
  if(authLoading)return;
  var e=((document.getElementById("log-email")||{}).value||"").trim();
  var p=(document.getElementById("log-pw")||{}).value||"";
  if(!e||!p){authError="Bitte alle Felder ausfüllen.";renderAuth();return;}
  authLoading=true;authError="";renderAuth();
  fAuth.signInWithEmailAndPassword(e,p).then(function(cred){
    currentUser=cred.user;
    return db.collection("users").doc(cred.user.uid).get().then(function(doc){
      userProfile=doc.exists?doc.data():loadProfileLocal(cred.user.uid);
    }).catch(function(){ userProfile=loadProfileLocal(cred.user.uid); });
  }).then(function(){
    authLoading=false;
    var hdrEl=document.getElementById("hdr"),navEl=document.getElementById("bottom-nav");
    if(hdrEl)hdrEl.style.display="";if(navEl)navEl.style.display="";
    if(!userProfile){
      /* Kein Profil in Firestore – neues anlegen */
      userProfile={uid:currentUser.uid,username:"",displayName:"",avatarEmoji:"💪",avatarColor:"#a3e635",email:currentUser.email||"",privacy:{visibility:"friends",showWeights:true}};
      selAvatarE="💪"; selAvatarC="#a3e635"; _epVis="friends"; _epWeights=true;
      screen="editProfile"; renderApp();
      toast("Bitte Profil einrichten 👋");
    } else {
      screen="home"; renderApp();
    }
  }).catch(function(err){authLoading=false;authError=getAuthError((err&&err.code)||"");renderAuth();});
}
function doLogout(btn){
  twoStep(btn,function(){
    fAuth.signOut().then(function(){
      currentUser=null;userProfile=null;screen="auth";
      var hdrEl=document.getElementById("hdr"),navEl=document.getElementById("bottom-nav");
      if(hdrEl)hdrEl.style.display="none";if(navEl)navEl.style.display="none";
      renderApp();
    });
  });
}
function doForgotPassword(){
  var e=((document.getElementById("log-email")||{}).value||"").trim();
  if(!e){authError="Bitte zuerst E-Mail eingeben.";renderAuth();return;}
  authLoading=true;renderAuth();
  fAuth.sendPasswordResetEmail(e).then(function(){
    authLoading=false;renderAuth();toast("📧 Reset-E-Mail gesendet!");
  }).catch(function(err){authLoading=false;authError=getAuthError(err.code||"");renderAuth();});
}
function syncLocalDataToFirestore(uid){
  if(!uid||!SESSIONS.length)return;
  try{
    var batch=db.batch();
    SESSIONS.slice(0,400).forEach(function(s){
      batch.set(db.collection("users").doc(uid).collection("sessions").doc(s.d+"_"+s.did),{d:s.d,did:s.did,title:s.title,color:s.color});
    });
    batch.commit().catch(function(){});
  }catch(e){}
}

    {v:"public",l:"🌍 Öffentlich",sub:"Jeder kann dein Profil sehen"},
    {v:"friends",l:"👥 Nur Freunde",sub:"Nur Freunde sehen deine Aktivitäten"},
    {v:"private",l:"🔒 Privat",sub:"Niemand außer dir"}
  ];
  var curVis=(p.privacy&&p.privacy.visibility)||"friends";
  var curWeights=(p.privacy&&p.privacy.showWeights!==false);

  var h='';

  /* Avatar */
  h+='<div style="background:var(--bg2);border:1px solid var(--b0);border-radius:var(--r);padding:14px;margin-bottom:13px;box-shadow:0 2px 14px rgba(0,0,30,0.65)">'
    +'<div style="font-size:11px;font-weight:600;color:var(--t2);text-transform:uppercase;letter-spacing:.05em;margin-bottom:12px">Avatar</div>'
    +'<div style="display:flex;align-items:center;gap:14px;margin-bottom:14px">'
    +'<div style="width:56px;height:56px;border-radius:50%;background:'+selAvatarC+';display:flex;align-items:center;justify-content:center;font-size:28px;flex-shrink:0">'+selAvatarE+'</div>'
    +'<div style="flex:1;font-size:13px;color:var(--t1)">@'+escHtml(p.username||'')+'</div>'
    +'</div>'
    +'<div style="display:grid;grid-template-columns:repeat(5,1fr);gap:6px;margin-bottom:10px">'
    +AVATAR_EMOJIS.map(function(e){return'<button onclick="pickAvatarEmoji(\''+e+'\')" style="aspect-ratio:1;border:2px solid '+(e===selAvatarE?"var(--blue)":"var(--b0)")+';border-radius:10px;background:'+(e===selAvatarE?"var(--bg4)":"var(--bg3)")+';font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center">'+e+'</button>';}).join('')
    +'</div>'
    +'<div style="display:flex;gap:8px;justify-content:center">'
    +AVATAR_COLORS.map(function(c){return'<button onclick="pickAvatarColor(\''+c+'\')" style="width:28px;height:28px;border-radius:50%;background:'+c+';border:3px solid '+(c===selAvatarC?"var(--t0)":"transparent")+';cursor:pointer"></button>';}).join('')
    +'</div></div>';

  /* Profil-Infos */
  h+='<div style="background:var(--bg2);border:1px solid var(--b0);border-radius:var(--r);padding:14px;margin-bottom:13px;box-shadow:0 2px 14px rgba(0,0,30,0.65)">'
    +'<div style="font-size:11px;font-weight:600;color:var(--t2);text-transform:uppercase;letter-spacing:.05em;margin-bottom:12px">Profil</div>'
    +'<div class="field"><label>Anzeigename</label><input id="ep-name" type="text" value="'+escHtml(p.displayName||p.username||"")+'" autocomplete="off" maxlength="30"></div>'
    +'<div class="field"><label>Bio / Motto <span style="color:var(--t2);font-weight:400">(optional)</span></label><input id="ep-bio" type="text" value="'+escHtml(p.bio||"")+'" placeholder="z.B. Kein Schmerz, kein Erfolg" autocomplete="off" maxlength="80"></div>'
    +'<div class="field"><label>Trainingsgoal</label><select id="ep-goal">'
    +GOALS.map(function(g){return'<option value="'+g.v+'"'+((p.goal||"")=== g.v?" selected":"")+'>'+g.l+'</option>';}).join('')
    +'</select></div>'
    +'<div class="field"><label>Gewichtsklasse</label><select id="ep-wclass">'
    +WCLASSES.map(function(w){return'<option value="'+w.v+'"'+((p.weightClass||"")=== w.v?" selected":"")+'>'+w.l+'</option>';}).join('')
    +'</select></div>'
    +'</div>';

  /* Datenschutz */
  h+='<div style="background:var(--bg2);border:1px solid var(--b0);border-radius:var(--r);padding:14px;margin-bottom:13px;box-shadow:0 2px 14px rgba(0,0,30,0.65)">'
    +'<div style="font-size:11px;font-weight:600;color:var(--t2);text-transform:uppercase;letter-spacing:.05em;margin-bottom:12px">Datenschutz & Sichtbarkeit</div>'
    +'<div style="display:flex;flex-direction:column;gap:8px;margin-bottom:14px" id="vis-group">'
    +VISIBILITY.map(function(v){
      var on=curVis===v.v;
      return '<div onclick="selectVisibility(\''+v.v+'\')" id="vis-'+v.v+'" style="display:flex;align-items:center;gap:12px;padding:11px 13px;border-radius:var(--rs);border:1.5px solid '+(on?"var(--blue-b)":"var(--b0)")+';background:'+(on?"var(--blue-bg)":"var(--bg3)")+';cursor:pointer">'
        +'<div style="flex:1"><div style="font-size:13px;font-weight:600;color:'+(on?"var(--blue)":"var(--t0)")+'">'+v.l+'</div>'
        +'<div style="font-size:11px;color:var(--t2);margin-top:2px">'+v.sub+'</div></div>'
        +'<div style="width:20px;height:20px;border-radius:50%;border:2px solid '+(on?"var(--blue)":"var(--b1)")+';background:'+(on?"var(--blue)":"transparent")+';display:flex;align-items:center;justify-content:center;flex-shrink:0">'
        +(on?'<div style="width:8px;height:8px;border-radius:50%;background:#fff"></div>':'')
        +'</div></div>';
    }).join('')
    +'</div>'
    +'<div style="display:flex;align-items:center;justify-content:space-between;padding:11px 13px;border-radius:var(--rs);border:1px solid var(--b0);background:var(--bg3)">'
    +'<div><div style="font-size:13px;font-weight:600;color:var(--t0)">Gewichte anzeigen</div>'
    +'<div style="font-size:11px;color:var(--t2);margin-top:2px">Freunde können deine Gewichte sehen</div></div>'
    +'<div onclick="toggleWeightsVis()" id="wv-toggle" style="width:44px;height:26px;border-radius:99px;background:'+(curWeights?"var(--blue)":"var(--bg4)")+';border:1px solid '+(curWeights?"var(--blue-b)":"var(--b1)")+';position:relative;cursor:pointer;flex-shrink:0;transition:background .2s">'
    +'<div style="position:absolute;top:3px;left:'+(curWeights?"19px":"3px")+';width:18px;height:18px;border-radius:50%;background:#fff;transition:left .2s"></div>'
    +'</div></div>'
    +'</div>';

  /* Speichern */
  h+='<button onclick="saveProfile()" style="width:100%;padding:14px;background:var(--blue);border:none;border-radius:var(--rs);color:#fff;font-size:15px;font-weight:700;font-family:inherit;cursor:pointer;margin-bottom:10px">Änderungen speichern</button>';

  /* Konto löschen */
  h+='<div style="margin-top:6px;padding-top:14px;border-top:1px solid var(--b0)">'
    +'<button onclick="deleteAccount(this)" style="width:100%;padding:13px;background:transparent;border:1px solid rgba(255,110,92,0.4);border-radius:var(--rs);color:var(--coral);font-size:13px;font-family:inherit;cursor:pointer">⚠ Konto unwiderruflich löschen</button>'
    +'</div>';

  document.getElementById("page").innerHTML=h;
}

var _epVis="friends", _epWeights=true;
function selectVisibility(v){
  _epVis=v;
  document.querySelectorAll("[id^='vis-']").forEach(function(el){
    var isOn=el.id==="vis-"+v;
    el.style.borderColor=isOn?"var(--blue-b)":"var(--b0)";
    el.style.background=isOn?"var(--blue-bg)":"var(--bg3)";
    var label=el.querySelector("div>div:first-child");
    if(label)label.style.color=isOn?"var(--blue)":"var(--t0)";
    var radio=el.querySelector("[style*='border-radius:50%']");
    // just re-render to be safe
  });
  // Simple re-render of just the toggle to avoid losing inputs
  var upd=document.getElementById("vis-"+v);
  if(upd){
    // rebuild full vis group cleanly
    var pg=document.getElementById("page");
    if(pg){var saved={name:(document.getElementById("ep-name")||{}).value,bio:(document.getElementById("ep-bio")||{}).value,goal:(document.getElementById("ep-goal")||{}).value,wclass:(document.getElementById("ep-wclass")||{}).value};
    if(userProfile){userProfile._tmpVis=v;}
    renderEditProfile();
    // restore inputs
    if(document.getElementById("ep-name"))document.getElementById("ep-name").value=saved.name||"";
    if(document.getElementById("ep-bio"))document.getElementById("ep-bio").value=saved.bio||"";
    }
  }
}
function toggleWeightsVis(){
  _epWeights=!_epWeights;
  var t=document.getElementById("wv-toggle");
  if(t){t.style.background=_epWeights?"var(--blue)":"var(--bg4)";t.style.borderColor=_epWeights?"var(--blue-b)":"var(--b1)";t.children[0].style.left=_epWeights?"19px":"3px";}
}

function saveProfile(){
  if(!currentUser||!userProfile)return;
  var name=((document.getElementById("ep-name")||{}).value||"").trim()||userProfile.username||"";
  var bio=((document.getElementById("ep-bio")||{}).value||"").trim();
  var goal=((document.getElementById("ep-goal")||{}).value)||"";
  var wclass=((document.getElementById("ep-wclass")||{}).value)||"";
  var vis=userProfile._tmpVis||(userProfile.privacy&&userProfile.privacy.visibility)||_epVis||"friends";
  var updates={
    displayName:name, bio:bio, goal:goal, weightClass:wclass,
    avatarEmoji:selAvatarE, avatarColor:selAvatarC,
    uid:currentUser.uid,
    username:userProfile.username||"",
    email:currentUser.email||"",
    privacy:{visibility:vis, showWeights:_epWeights}
  };
  /* set+merge statt update – funktioniert auch wenn Dokument nicht existiert */
  db.collection("users").doc(currentUser.uid).set(updates,{merge:true}).then(function(){
    /* Benutzername-Mapping sicherstellen */
    if(userProfile.username){
      db.collection("usernames").doc(userProfile.username).set({uid:currentUser.uid},{merge:true}).catch(function(){});
    }
    Object.assign(userProfile,updates);
    delete userProfile._tmpVis;
    saveProfileLocal(userProfile);
    var av=document.querySelector(".hdr-avatar");
    if(av){av.style.background=selAvatarC;av.textContent=selAvatarE;}
    toast("✓ Profil gespeichert");
    goManage();
  }).catch(function(e){
    /* Firestore fehlgeschlagen → lokal speichern */
    Object.assign(userProfile,updates);
    saveProfileLocal(userProfile);
    toast("✓ Lokal gespeichert");
    goManage();
  });
}

function deleteAccount(btn){
  twoStep(btn,function(){
    if(!currentUser)return;
    var uid=currentUser.uid;
    var username=userProfile?userProfile.username:"";
    // Delete Firestore docs
    var dels=[db.collection("users").doc(uid).delete()];
    if(username)dels.push(db.collection("usernames").doc(username).delete());
    Promise.all(dels).then(function(){
      return currentUser.delete();
    }).then(function(){
      currentUser=null;userProfile=null;
      var hdrEl=document.getElementById("hdr"),navEl=document.getElementById("bottom-nav");
      if(hdrEl)hdrEl.style.display="none";if(navEl)navEl.style.display="none";
      screen="auth";authMode="register";renderApp();
      toast("Konto gelöscht");
    }).catch(function(e){
      toast("Fehler – bitte neu anmelden und erneut versuchen");
    });
  });
}

/* Portrait lock via API */
try{ if(window.screen&&screen.orientation&&screen.orientation.lock)screen.orientation.lock("portrait").catch(function(){}); }catch(e){}

/* Swipe left/right between main tabs */
(function(){
  var sx=0,sy=0;
  var MAIN=["home","planSelect","stats","manage"];
  document.addEventListener("touchstart",function(e){sx=e.touches[0].clientX;sy=e.touches[0].clientY;},{passive:true});
  document.addEventListener("touchend",function(e){
    var dx=e.changedTouches[0].clientX-sx;
    var dy=e.changedTouches[0].clientY-sy;
    if(Math.abs(dy)>Math.abs(dx)||Math.abs(dx)<75)return;
    var cur=(screen==="plan"||screen==="exDetail")?"planSelect":screen;
    var idx=MAIN.indexOf(cur);
    if(idx===-1)return;
    if(dx<0&&idx<MAIN.length-1){
      var n=MAIN[idx+1];
      if(n==="planSelect")goPlan();else if(n==="stats")goStats();else goManage();
    } else if(dx>0&&idx>0){
      var p=MAIN[idx-1];
      if(p==="home")goHomeBtn();else if(p==="planSelect")goPlan();else goStats();
    }
  },{passive:true});
})();

loadAll();
fAuth.onAuthStateChanged(function(user){
  if(user){
    currentUser=user;
    db.collection("users").doc(user.uid).get().then(function(doc){
      var loaded=doc.exists?doc.data():loadProfileLocal(user.uid);
      /* Nicht überschreiben wenn Profil gerade bearbeitet wird */
      if(screen!=="editProfile")userProfile=loaded;
      else if(!userProfile)userProfile=loaded;
      if(screen==="auth")screen="home";
      renderApp();
    }).catch(function(){
      var loaded=loadProfileLocal(user.uid);
      if(screen!=="editProfile")userProfile=loaded;
      else if(!userProfile)userProfile=loaded;
      if(screen==="auth")screen="home";
      renderApp();
    });
  } else {
    currentUser=null;userProfile=null;screen="auth";
    var hdrEl=document.getElementById("hdr"),navEl=document.getElementById("bottom-nav");
    if(hdrEl)hdrEl.style.display="none";if(navEl)navEl.style.display="none";
    renderAuth();
  }
});
</script>
